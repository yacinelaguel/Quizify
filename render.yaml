# Render configuration for Quizify
# Auto-deploys on push to main branch
# No configuration needed — API key is hardcoded

services:
  - type: web
    name: quizify
    env: python
    pythonVersion: 3.11
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --worker-connections 1000
    
    # Environment variables — minimal setup
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 8000

    # Auto-deploy on push
    autoDeploy: true
    
    # Health check
    healthCheckPath: /health
